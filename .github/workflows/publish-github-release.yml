name: Publish GitHub Release

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: "Mod version to publish (example: 1.2.0)"
        required: true
        type: string
      minecraft_version:
        description: "Minecraft version to target (example: 1.21.1)"
        required: true
        type: string
      tag:
        description: "Optional release tag override (default: v<mod_version>-mc<minecraft_version>)"
        required: false
        default: ""
        type: string
      release_name:
        description: Optional release name override
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark this release as prerelease
        required: true
        default: false
        type: boolean
      extra_gradle_args:
        description: "Optional extra Gradle args (example: -Pfabric_api_version=0.121.0+1.21.5 -Pneoforge_version=21.5.0)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      MOD_VERSION: ${{ inputs.mod_version }}
      MINECRAFT_VERSION: ${{ inputs.minecraft_version }}
      EXTRA_GRADLE_ARGS: ${{ inputs.extra_gradle_args }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Read archive base name from gradle.properties
        id: props
        run: |
          archive_name="$(grep '^archives_name=' gradle.properties | cut -d'=' -f2-)"
          if [[ -z "${archive_name}" ]]; then
            echo "Failed to read archives_name from gradle.properties" >&2
            exit 1
          fi
          echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"

      - name: Build Fabric and NeoForge jars
        run: |
          args=(
            ":fabric:clean"
            ":neoforge:clean"
            ":fabric:remapJar"
            ":neoforge:remapJar"
            "-Pmod_version=${MOD_VERSION}"
            "-Pminecraft_version=${MINECRAFT_VERSION}"
          )

          if [[ -n "${EXTRA_GRADLE_ARGS}" ]]; then
            read -r -a extra <<< "${EXTRA_GRADLE_ARGS}"
            args+=("${extra[@]}")
          fi

          ./gradlew --stacktrace "${args[@]}"

      - name: Derive release metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          default_tag="v${MOD_VERSION}-mc${MINECRAFT_VERSION}"
          default_name="Terrarium Expanded ${MOD_VERSION} for Minecraft ${MINECRAFT_VERSION} (Fabric + NeoForge)"

          tag="${INPUT_TAG:-$default_tag}"
          name="${INPUT_RELEASE_NAME:-$default_name}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Verify release artifacts exist
        run: |
          fabric_jar="fabric/build/libs/${{ steps.props.outputs.archive_name }}-fabric-${MOD_VERSION}.jar"
          neoforge_jar="neoforge/build/libs/${{ steps.props.outputs.archive_name }}-neoforge-${MOD_VERSION}.jar"

          test -f "${fabric_jar}" || (echo "Missing file: ${fabric_jar}" >&2 && exit 1)
          test -f "${neoforge_jar}" || (echo "Missing file: ${neoforge_jar}" >&2 && exit 1)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terrarium-expanded-${{ inputs.mod_version }}-mc${{ inputs.minecraft_version }}
          path: |
            fabric/build/libs/${{ steps.props.outputs.archive_name }}-fabric-${{ inputs.mod_version }}.jar
            neoforge/build/libs/${{ steps.props.outputs.archive_name }}-neoforge-${{ inputs.mod_version }}.jar
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          append_body: true
          body: |
            Minecraft version: `${{ inputs.minecraft_version }}`
            Loaders: `fabric`, `neoforge`
          files: |
            fabric/build/libs/${{ steps.props.outputs.archive_name }}-fabric-${{ inputs.mod_version }}.jar
            neoforge/build/libs/${{ steps.props.outputs.archive_name }}-neoforge-${{ inputs.mod_version }}.jar
          fail_on_unmatched_files: true
